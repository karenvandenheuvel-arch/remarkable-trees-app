<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/src/styles/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>remarkable-trees-app</title>
</head>

<body>
  <header>
    <div class="header-inner">

      <!-- RIJ 1 -->
      <div class="header-row top-row">
        <div class="header-left">
          <div id="view-switch">
            <button id="view-list" class="view-btn active">Lijst</button>
            <button id="view-map" class="view-btn">Kaart</button>
          </div>
        </div>

        <h1 class="site-title">Remarkable Trees in Brussels</h1>

        <div class="header-right">
          <div class="favorites-block">
            <button id="favorites-toggle" class="fav-filter-btn">
              ❤️ Alleen favorieten
            </button>


            <button id="favorites-reset" class="fav-reset-btn">
              Reset favorieten
            </button>

            <div id="language-switch">
              <button class="lang-btn active" data-lang="nl">NL</button>
              <button class="lang-btn" data-lang="fr">FR</button>
            </div>
          </div>
        </div>
      </div>

      <!-- RIJ 2 -->
      <div class="header-row bottom-row">
        <div class="controls-left">
          <div class="control-group">
            <label for="sort-select">Sorteer op</label>
            <select id="sort-select">
              <option value="name">Naam</option>
              <option value="girth">Omtrek</option>
              <option value="crown">Kruindiameter</option>
            </select>
          </div>

          <div class="control-group">
            <label for="search-bar">Zoek op naam</label>
            <input id="search-bar" type="text" placeholder="Zoek op naam...">
          </div>

          <div class="control-group">
            <label for="status-filter">Filter op status</label>
            <select id="status-filter">
              <option value="all">Alle</option>
              <!-- later dynamisch vullen -->
            </select>
          </div>

          <div class="control-group">
            <label for="rarity-filter">Filter op zeldzaamheid</label>
            <select id="rarity-filter">
              <option value="all">Alle</option>
              <option value="low">Gewoon</option>
              <option value="medium">Bijzonder</option>
              <option value="high">Zeldzaam</option>
            </select>
          </div>
        </div>

        <div class="controls-right">
          <div class="control-group slider-group">
            <label for="girth-slider">Omtrek</label>
            <input id="girth-slider" type="range" min="0" max="600" step="10">
            <span id="girth-value"></span>
          </div>

          <div class="control-group slider-group">
            <label for="crown-slider">Diameter top</label>
            <input id="crown-slider" type="range" min="0" max="40" step="1">
            <span id="crown-value"></span>
          </div>
        </div>
      </div>

    </div>
  </header>


  <main>
    <section id="list-view"></section>
    <section id="map-view" style="display: none;"></section>
  </main>
  <script type="module" src="/src/scripts/app.js"></script>


</body>

</html>
